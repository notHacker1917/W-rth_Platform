version: '3.8'
services:
  app:
    image: node:20-slim
    container_name: wurth_app
    working_dir: /app
    ports:
      - "3000:3000"
    volumes:
      - .:/app
      - /app/node_modules
    environment:
      - NODE_ENV=development
      - DATABASE_URL=file:/app/data/wurth_community.db
    command: sh -c "apt-get update && apt-get install -y python3 make g++ && npm install && npm run dev"

volumes:
  sqlite_data:
